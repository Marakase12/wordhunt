<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordHunt — English Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--card:#0f0f1a;--card2:#141425;
  --border:#1e1e35;--border2:#2a2a45;
  --accent:#6c5ce7;--accent2:#ff6584;--green:#00f5a0;--gold:#ffd700;
  --text:#eeeef8;--muted:#5555aa;--muted2:#8888cc;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;
  padding:0;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;top:0;left:0;right:0;height:300px;
  background:radial-gradient(ellipse at 50% 0%,rgba(108,92,231,0.12) 0%,transparent 70%);pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-family:'Space Mono',monospace;color:var(--accent);letter-spacing:3px;font-weight:700}
.logo span{color:var(--accent2)}
.nav-stats{display:flex;gap:16px}
.nstat{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-align:center}
.nstat b{display:block;font-size:16px;color:var(--text);margin-bottom:2px}

/* MAIN */
main{max-width:560px;margin:0 auto;padding:20px 16px 100px;position:relative;z-index:1}

/* PROGRESS */
.prog-wrap{background:var(--border);height:4px;border-radius:4px;margin-bottom:8px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:20px;display:flex;justify-content:space-between}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:4px}
.tab{flex:1;padding:10px;border-radius:10px;border:none;background:transparent;color:var(--muted2);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 20px rgba(108,92,231,.4)}

/* STREAK */
.streak{display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,0,.08);
  border:1px solid rgba(255,215,0,.2);border-radius:30px;padding:8px 16px;
  font-size:13px;font-weight:700;color:var(--gold);font-family:'Space Mono',monospace;margin-bottom:16px}

/* SESSION STATS */
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.scard .num{font-size:20px;font-weight:800;margin-bottom:2px}
.scard .lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}

/* MAIN CARD */
.card-wrap{perspective:1200px;margin-bottom:16px}
.card{min-height:240px;background:var(--card);border:1px solid var(--border2);border-radius:24px;
  padding:36px 28px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 20px 60px rgba(108,92,231,.15)}
.card:active{transform:translateY(0)}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .3s}
.card.revealed::after{opacity:1}
.card-glow{position:absolute;top:-80px;right:-80px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(108,92,231,.06) 0%,transparent 70%);pointer-events:none}
.cat-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:9px;
  color:var(--accent);letter-spacing:2px;text-transform:uppercase;
  background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.2);
  border-radius:20px;padding:4px 10px;margin-bottom:20px}
.word-big{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:10px;
  background:linear-gradient(135deg,var(--text),rgba(238,238,248,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.phonetic{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted2);margin-bottom:24px}
.translation{font-size:22px;font-weight:800;color:var(--green);margin-bottom:10px;
  opacity:0;transition:opacity .3s;transform:translateY(6px);transition:all .3s}
.example{font-size:13px;color:var(--muted2);font-style:italic;line-height:1.6;
  opacity:0;transition:all .3s;transform:translateY(6px)}
.card.revealed .translation,.card.revealed .example{opacity:1;transform:translateY(0)}
.tap-hint{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  letter-spacing:1px;margin-top:20px;transition:opacity .3s}
.card.revealed .tap-hint{opacity:0}
.diff-tag{position:absolute;top:14px;right:14px;font-family:'Space Mono',monospace;
  font-size:9px;padding:3px 8px;border-radius:10px;font-weight:700}
.diff-new{background:rgba(108,92,231,.15);color:var(--accent);border:1px solid rgba(108,92,231,.3)}
.diff-learning{background:rgba(255,165,0,.1);color:#ffa500;border:1px solid rgba(255,165,0,.3)}
.diff-review{background:rgba(0,245,160,.08);color:var(--green);border:1px solid rgba(0,245,160,.2)}
.diff-known{background:rgba(255,215,0,.08);color:var(--gold);border:1px solid rgba(255,215,0,.2)}

/* ACTION BUTTONS */
.btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;
  opacity:0;pointer-events:none;transition:opacity .3s;transform:translateY(8px);transition:all .3s}
.btns.show{opacity:1;pointer-events:all;transform:translateY(0)}
.btn{padding:14px 8px;border-radius:14px;border:1px solid var(--border2);background:var(--card);
  color:var(--text);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.btn:hover{transform:translateY(-2px)}
.btn .icon{font-size:16px}
.btn .lbl{font-size:11px}
.btn .intv{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted)}
.btn-again{border-color:rgba(255,101,132,.3)} .btn-again:hover{background:rgba(255,101,132,.12);border-color:var(--accent2)}
.btn-hard{border-color:rgba(255,165,0,.25)} .btn-hard:hover{background:rgba(255,165,0,.1);border-color:rgba(255,165,0,.5)}
.btn-good{border-color:rgba(108,92,231,.3)} .btn-good:hover{background:rgba(108,92,231,.12);border-color:var(--accent)}
.btn-easy{border-color:rgba(0,245,160,.2)} .btn-easy:hover{background:rgba(0,245,160,.08);border-color:var(--green)}

/* QUIZ */
.quiz-q{background:var(--card);border:1px solid var(--border2);border-radius:24px;
  padding:32px 24px;text-align:center;margin-bottom:14px}
.quiz-word{font-size:44px;font-weight:900;letter-spacing:-2px;margin-bottom:8px;
  background:linear-gradient(135deg,var(--text),rgba(238,238,248,.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.qopt{padding:18px;background:var(--card);border:1px solid var(--border2);border-radius:14px;
  color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;text-align:center;line-height:1.3}
.qopt:hover:not(.dis){border-color:var(--accent);background:rgba(108,92,231,.08);transform:translateY(-2px)}
.qopt.correct{border-color:var(--green)!important;background:rgba(0,245,160,.1)!important;color:var(--green)!important}
.qopt.wrong{border-color:var(--accent2)!important;background:rgba(255,101,132,.1)!important;color:var(--accent2)!important}
.qopt.dis{cursor:default}

/* WORD HUNT */
.hunt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.hunt-card{background:var(--card);border:1px solid var(--border2);border-radius:16px;
  padding:16px;cursor:pointer;transition:all .2s;position:relative}
.hunt-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.hunt-card.selected{border-color:var(--accent2);background:rgba(255,101,132,.05)}
.hunt-word{font-size:20px;font-weight:800;margin-bottom:4px}
.hunt-trans{font-size:12px;color:var(--muted2)}
.hunt-score{position:absolute;top:10px;right:10px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.hunt-bar{height:3px;border-radius:2px;margin-top:8px;background:var(--border)}
.hunt-bar-fill{height:100%;border-radius:2px;transition:width .4s}

/* VOCAB LIST */
.search-box{width:100%;padding:14px 18px;background:var(--card);border:1px solid var(--border2);
  border-radius:14px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;
  outline:none;margin-bottom:14px;transition:border-color .2s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.vocab-list{display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto;padding-right:4px}
.vocab-list::-webkit-scrollbar{width:4px}
.vocab-list::-webkit-scrollbar-track{background:var(--card)}
.vocab-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.vitem{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all .2s}
.vitem:hover{border-color:var(--border2);background:var(--card2)}
.vword{font-size:16px;font-weight:700}
.vtrans{font-size:12px;color:var(--muted2);margin-top:2px}
.vbadge{font-family:'Space Mono',monospace;font-size:9px;padding:4px 8px;border-radius:8px;font-weight:700;white-space:nowrap}

/* HIDDEN */
.hidden{display:none!important}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--card2);border:1px solid var(--border2);border-radius:14px;
  padding:12px 20px;font-size:13px;font-weight:700;transition:transform .3s;z-index:200;
  box-shadow:0 10px 40px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav>
  <div class="logo">WORD<span>HUNT</span></div>
  <div class="nav-stats">
    <div class="nstat"><b id="navToday">0</b>сегодня</div>
    <div class="nstat"><b id="navStreak">0</b>🔥 дней</div>
    <div class="nstat"><b id="navKnown">0</b>знаю</div>
    <div class="nstat"><b id="navTotal">0</b>слов</div>
  </div>
</nav>

<main>
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
  <div class="prog-label"><span id="progLabel">Загрузка...</span><span id="progPct">0%</span></div>

  <div class="streak" id="streakBadge">🔥 <span id="streakDays">0</span> дней подряд</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('flash',this)">Карточки</button>
    <button class="tab" onclick="switchTab('quiz',this)">Квиз</button>
    <button class="tab" onclick="switchTab('hunt',this)">Хант</button>
    <button class="tab" onclick="switchTab('vocab',this)">Слова</button>
  </div>

  <!-- FLASHCARD -->
  <div id="tab-flash">
    <div class="srow">
      <div class="scard"><div class="num" id="sc-again" style="color:var(--accent2)">0</div><div class="lbl">Снова</div></div>
      <div class="scard"><div class="num" id="sc-hard" style="color:#ffa500">0</div><div class="lbl">Сложно</div></div>
      <div class="scard"><div class="num" id="sc-good" style="color:var(--accent)">0</div><div class="lbl">Хорошо</div></div>
      <div class="scard"><div class="num" id="sc-easy" style="color:var(--green)">0</div><div class="lbl">Легко</div></div>
    </div>
    <div class="card-wrap">
      <div class="card" id="mainCard" onclick="revealCard()">
        <div class="card-glow"></div>
        <div class="diff-tag diff-new" id="diffTag">NEW</div>
        <div class="cat-badge" id="catBadge">NOUN</div>
        <div class="word-big" id="cardWord">—</div>
        <div class="phonetic" id="cardPhon"></div>
        <div class="translation" id="cardTrans"></div>
        <div class="example" id="cardEx"></div>
        <div class="tap-hint">нажми чтобы открыть</div>
      </div>
    </div>
    <div class="btns" id="actionBtns">
      <button class="btn btn-again" onclick="rate('again')"><span class="icon">🔁</span><span class="lbl">Снова</span><span class="intv">&lt;1 мин</span></button>
      <button class="btn btn-hard" onclick="rate('hard')"><span class="icon">😤</span><span class="lbl">Сложно</span><span class="intv">~10 мин</span></button>
      <button class="btn btn-good" onclick="rate('good')"><span class="icon">👍</span><span class="lbl">Хорошо</span><span class="intv">~1 день</span></button>
      <button class="btn btn-easy" onclick="rate('easy')"><span class="icon">⚡</span><span class="lbl">Легко</span><span class="intv">~4 дня</span></button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="tab-quiz" class="hidden">
    <div class="quiz-q">
      <div class="cat-badge" id="qCat">NOUN</div>
      <div class="quiz-word" id="qWord">—</div>
      <div class="phonetic" id="qPhon"></div>
    </div>
    <div class="quiz-opts" id="qOpts"></div>
  </div>

  <!-- HUNT MODE -->
  <div id="tab-hunt" class="hidden">
    <p style="font-size:13px;color:var(--muted2);margin-bottom:16px;font-family:'Space Mono',monospace;line-height:1.6">
      Слова которые знаешь плохо — появляются чаще. Оцени каждое слово чтобы настроить систему.
    </p>
    <div class="hunt-grid" id="huntGrid"></div>
    <button onclick="loadHunt()" style="width:100%;padding:14px;background:var(--card);border:1px solid var(--border2);
      border-radius:14px;color:var(--muted2);font-family:'Syne',sans-serif;font-size:13px;
      font-weight:700;cursor:pointer;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border2)'">
      🎲 Новые слова
    </button>
  </div>

  <!-- VOCAB LIST -->
  <div id="tab-vocab" class="hidden">
    <input class="search-box" id="searchBox" placeholder="🔍 Искать слово..." oninput="renderVocab()">
    <div class="vocab-list" id="vocabList"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ============ WORD DATABASE ============

// ============ STATE ============
let state = loadState();
let sessionStats = {again:0,hard:0,good:0,easy:0};
let flashQueue = [];
let currentWord = null;
let revealed = false;
let currentTab = 'flash';

function loadState(){
  try{
    const s = localStorage.getItem('wh_state_v2');
    if(s) return JSON.parse(s);
  }catch(e){}
  return {
    words:{},       // word -> {ease, interval, due, reps, score}
    streak:0,
    lastDate:'',
    todayCount:0,
    totalReps:0,
    lastResetDate:''
  };
}

function saveState(){
  localStorage.setItem('wh_state_v2', JSON.stringify(state));
  updateNavStats();
}

function getWordState(w){
  if(!state.words[w]) state.words[w] = {ease:2.5,interval:0,due:0,reps:0,score:0};
  return state.words[w];
}

// Score: 0=new, 1=learning, 2=review, 3=known
function getDiffLevel(ws){
  if(!ws || ws.reps===0) return 0;
  if(ws.score<2) return 1;
  if(ws.score<5) return 2;
  return 3;
}

function getDiffTag(level){
  const tags=['NEW','LEARNING','REVIEW','KNOWN'];
  const cls=['diff-new','diff-learning','diff-review','diff-known'];
  return {label:tags[level],cls:cls[level]};
}

// ============ SPACED REPETITION (SM-2) ============
function sm2(ws, quality){ // quality: 0=again,1=hard,2=good,3=easy
  let {ease,interval,reps,score} = ws;
  if(quality<2){
    reps=0; interval=1; score=Math.max(0,score-1);
  } else {
    if(reps===0) interval=1;
    else if(reps===1) interval=6;
    else interval=Math.round(interval*ease);
    reps++;
    score=Math.min(10,score+quality);
  }
  ease=Math.max(1.3, ease+(0.1-(3-quality)*(0.08+(3-quality)*0.02)));
  const due=Date.now()+interval*24*60*60*1000;
  return {ease,interval,reps,score,due};
}

// ============ FLASH QUEUE ============
function buildQueue(){
  const now = Date.now();
  const due = WORDS.filter(w=>{
    const ws=getWordState(w.w);
    return ws.due<=now;
  });
  // Sort: new words first, then by score ascending (harder = more priority)
  due.sort((a,b)=>{
    const wa=getWordState(a.w), wb=getWordState(b.w);
    if(wa.reps===0 && wb.reps>0) return -1;
    if(wb.reps===0 && wa.reps>0) return 1;
    return wa.score-wb.score;
  });
  // If nothing due, pick 10 worst
  if(due.length===0){
    const sorted=[...WORDS].sort((a,b)=>getWordState(a.w).score-getWordState(b.w).score);
    return sorted.slice(0,20);
  }
  return due.slice(0,50);
}

function nextCard(){
  if(flashQueue.length===0) flashQueue=buildQueue();
  if(flashQueue.length===0) return null;
  return flashQueue[0];
}

function showFlashCard(){
  currentWord=nextCard();
  if(!currentWord){showToast('🎉 Все слова повторены!');return;}
  const ws=getWordState(currentWord.w);
  const lvl=getDiffLevel(ws);
  const tag=getDiffTag(lvl);
  document.getElementById('diffTag').textContent=tag.label;
  document.getElementById('diffTag').className='diff-tag '+tag.cls;
  document.getElementById('catBadge').textContent=currentWord.cat;
  document.getElementById('cardWord').textContent=currentWord.w;
  document.getElementById('cardPhon').textContent=currentWord.p;
  document.getElementById('cardTrans').textContent=currentWord.t;
  document.getElementById('cardEx').textContent='"'+currentWord.ex+'"';
  document.getElementById('mainCard').classList.remove('revealed');
  document.getElementById('actionBtns').classList.remove('show');
  revealed=false;
  updateProgress();
}

function revealCard(){
  if(revealed) return;
  revealed=true;
  document.getElementById('mainCard').classList.add('revealed');
  document.getElementById('actionBtns').classList.add('show');
}

function rate(r){
  if(!currentWord) return;
  const qmap={again:0,hard:1,good:2,easy:3};
  const q=qmap[r];
  const ws=getWordState(currentWord.w);
  const newWs=sm2(ws,q);
  state.words[currentWord.w]=newWs;
  sessionStats[r]++;
  document.getElementById('sc-'+r).textContent=sessionStats[r];
  state.todayCount++;
  state.totalReps++;
  checkStreak();
  saveState();
  if(r==='again'||r==='hard'){
    flashQueue.shift();
    const later=Math.min(flashQueue.length,5);
    flashQueue.splice(later,0,currentWord);
  } else {
    flashQueue.shift();
  }
  showFlashCard();
}

// ============ QUIZ MODE ============
function showQuiz(){
  if(flashQueue.length===0) flashQueue=buildQueue();
  const word=flashQueue[Math.floor(Math.random()*Math.min(flashQueue.length,10))];
  if(!word) return;
  document.getElementById('qCat').textContent=word.cat;
  document.getElementById('qWord').textContent=word.w;
  document.getElementById('qPhon').textContent=word.p;
  const others=WORDS.filter(w=>w.w!==word.w);
  shuffle(others);
  const opts=[word,...others.slice(0,3)];
  shuffle(opts);
  const container=document.getElementById('qOpts');
  container.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='qopt';
    btn.textContent=o.t;
    btn.onclick=()=>checkQuiz(btn,o.w===word.w,word.t,word);
    container.appendChild(btn);
  });
}

function checkQuiz(btn,correct,correctTrans,word){
  document.querySelectorAll('.qopt').forEach(b=>b.classList.add('dis'));
  if(correct){
    btn.classList.add('correct');
    const ws=getWordState(word.w);
    state.words[word.w]=sm2(ws,2);
    state.todayCount++;state.totalReps++;
    checkStreak();saveState();
    setTimeout(showQuiz,900);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.qopt').forEach(b=>{
      if(b.textContent===correctTrans) b.classList.add('correct');
    });
    const ws=getWordState(word.w);
    state.words[word.w]=sm2(ws,0);
    saveState();
    setTimeout(showQuiz,1600);
  }
}

// ============ HUNT MODE ============
function loadHunt(){
  // Pick 8 words weighted by difficulty (worse = more likely)
  const weighted=[];
  WORDS.forEach(w=>{
    const ws=getWordState(w.w);
    const weight=Math.max(1, 5-ws.score);
    for(let i=0;i<weight;i++) weighted.push(w);
  });
  shuffle(weighted);
  const seen=new Set();
  const picked=[];
  for(const w of weighted){
    if(!seen.has(w.w)){seen.add(w.w);picked.push(w);}
    if(picked.length>=8) break;
  }
  renderHunt(picked);
}

function renderHunt(words){
  const grid=document.getElementById('huntGrid');
  grid.innerHTML='';
  words.forEach(w=>{
    const ws=getWordState(w.w);
    const lvl=getDiffLevel(ws);
    const colors=['var(--accent)','#ffa500','var(--accent)','var(--green)'];
    const pct=Math.min(100,(ws.score/10)*100);
    const card=document.createElement('div');
    card.className='hunt-card';
    card.innerHTML=`
      <div class="hunt-word">${w.w}</div>
      <div class="hunt-trans">${w.t}</div>
      <div class="hunt-score">${['🆕','📚','🔄','✅'][lvl]}</div>
      <div class="hunt-bar"><div class="hunt-bar-fill" style="width:${pct}%;background:${colors[lvl]}"></div></div>`;
    card.onclick=()=>{
      const ws2=getWordState(w.w);
      const newWs=sm2(ws2,2);
      state.words[w.w]=newWs;
      state.todayCount++;state.totalReps++;
      checkStreak();saveState();
      card.style.borderColor='var(--green)';
      card.style.opacity='0.5';
      setTimeout(()=>loadHunt(),300);
    };
    grid.appendChild(card);
  });
}

// ============ VOCAB TAB ============
function renderVocab(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const list=document.getElementById('vocabList');
  list.innerHTML='';
  const filtered=WORDS.filter(w=>
    w.w.includes(q)||w.t.toLowerCase().includes(q)||w.cat.toLowerCase().includes(q)
  ).slice(0,80);
  filtered.forEach(w=>{
    const ws=getWordState(w.w);
    const lvl=getDiffLevel(ws);
    const lbls=['NEW','УЧУ','ПОВТОР','ЗНАЮ'];
    const cols=['var(--accent)','#ffa500','var(--accent2)','var(--green)'];
    const item=document.createElement('div');
    item.className='vitem';
    item.innerHTML=`<div>
      <div class="vword">${w.w} <span style="font-size:12px;color:var(--muted2)">${w.p}</span></div>
      <div class="vtrans">${w.t} · <span style="color:var(--muted);font-size:11px">${w.cat}</span></div>
    </div>
    <span class="vbadge" style="background:${cols[lvl]}22;color:${cols[lvl]};border:1px solid ${cols[lvl]}44">${lbls[lvl]}</span>`;
    item.onclick=()=>{
      flashQueue=[w,...flashQueue];
      switchTab('flash');
      document.querySelectorAll('.tab').forEach((t,i)=>{if(i===0)t.classList.add('active');else t.classList.remove('active')});
      showFlashCard();
      showToast(`Слово "${w.w}" добавлено в очередь`);
    };
    list.appendChild(item);
  });
}

// ============ HELPERS ============
function checkStreak(){
  const today=new Date().toDateString();
  if(state.lastDate!==today){
    const yesterday=new Date(Date.now()-86400000).toDateString();
    if(state.lastDate===yesterday) state.streak++;
    else state.streak=1;
    state.lastDate=today;
    state.todayCount=state.todayCount||0;
  }
  document.getElementById('streakDays').textContent=state.streak;
  document.getElementById('navStreak').textContent=state.streak;
}

function updateNavStats(){
  const known=Object.values(state.words).filter(w=>w.score>=5).length;
  document.getElementById('navToday').textContent=state.todayCount||0;
  document.getElementById('navKnown').textContent=known;
  document.getElementById('navTotal').textContent=WORDS.length;
  document.getElementById('streakDays').textContent=state.streak;
  document.getElementById('navStreak').textContent=state.streak;
}

function updateProgress(){
  const done=Object.values(state.words).filter(w=>w.reps>0).length;
  const pct=(done/WORDS.length*100).toFixed(0);
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${done} из ${WORDS.length} слов изучено`;
  document.getElementById('progPct').textContent=pct+'%';
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function switchTab(tab, btn){
  currentTab=tab;
  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
  if(btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');}
  if(tab==='flash'){flashQueue=buildQueue();showFlashCard();}
  if(tab==='quiz'){flashQueue=buildQueue();showQuiz();}
  if(tab==='hunt') loadHunt();
  if(tab==='vocab') renderVocab();
}

// ============ INIT ============
function init(){
  checkStreak();
  updateNavStats();
  updateProgress();
  flashQueue=buildQueue();
  showFlashCard();
}

init();
</script>
